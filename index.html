<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo app</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1>ToDo App</h1>
        <form class="todo-add-form" method="post">
            <input type="text" id="todo-input">
            <input type="submit" value="Add">
        </form>
        <ul>
            <li>
                <p id="task_text">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                <div class="actions">
                    <button style="background-color: green;">Mark as Done</button>
                    <button style="background-color: red;">Delete</button>
                </div>
            </li>
        </ul>
    </div>


    <script src="./script.js"></script>
</body>

</html>
